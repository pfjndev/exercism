name: Auto-rebase Exercism Solutions
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  auto-rebase:
    runs-on: ubuntu-latest
    env:
      # This replaces the need for actions/checkout
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CURRENT_PR: ${{ github.event.pull_request.number }}
    steps:
      - name: Fast Merge & Cleanup
        run: |
          set -e

          # 1. CLEANUP & LABEL (Combined logic)
          # We fetch old PRs and create the label in the background or sequence
          echo "Syncing PR #$CURRENT_PR..."
          
          # Close old PRs from the bot (if any)
          gh pr list --author "exercism-solutions-syncer[bot]" --state open --json number --jq ".[].number | select(. != $CURRENT_PR)" | xargs -I {} gh pr close {} --comment "Superseded by #$CURRENT_PR" --delete-branch || true

          # 2. ENSURE LABEL & EDIT & MERGE
          # We 'upsert' the label and then pipe the edit/merge commands.
          gh label create "exercism" --color "19DD95" --force 2>/dev/null || true
          
          # We perform the edit and merge. 
          # Note: gh pr merge --rebase --delete-branch is the fastest way to conclude.
          gh pr edit "$CURRENT_PR" --add-label "exercism"
          gh pr merge "$CURRENT_PR" --rebase --delete-branch
