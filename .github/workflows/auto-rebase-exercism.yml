name: Auto-rebase Exercism Solutions
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  auto-rebase:
    runs-on: ubuntu-latest
    # Only run for the Exercism bot
    if: github.event.pull_request.user.login == 'exercism-solutions-syncer[bot]'
    
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Add Label and Rebase
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          # 1. Ensure the label exists (no-op if it already does)
          gh label create "exercism" --color "19DD95" || true
          
          # 2. Tag the PR for better organization
          gh pr edit "$PR_URL" --add-label "exercism"
          
          # 3. Rebase onto master and delete the sync branch
          gh pr merge "$PR_URL" --rebase --delete-branch
