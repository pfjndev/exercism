name: Auto-merge Exercism Solutions
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only run for pull requests created by the Exercism syncer bot
    if: github.event.pull_request.user.login == 'exercism-solutions-syncer[bot]'
    
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Merge the PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          # --merge: Uses a standard merge commit
          # --delete-branch: Cleans up the temporary branch after merging
          gh pr merge "$PR_URL" --merge --delete-branch
